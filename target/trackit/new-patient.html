<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trackit – New Patient</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body {
      background: var(--bg);
    }

    /* Decorative blobs */
    .blob-light {
      position: fixed;
      top: 60px;
      right: 0;
      width: 38%;
      pointer-events: none;
      z-index: 0;
    }

    .blob-dark {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 28%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Main layout ─────────────────────────── */
    .main-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 28px;
      max-width: 1160px;
      margin: 30px auto;
      margin-top: 90px;
      padding: 0 28px;
    }

    /* ── Form sections ───────────────────────── */
    .form-sections {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section-card .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 32px;
    }

    /*.field-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      align-items: center;
      gap: 8px;
    }*/
    .field-row{
    display:grid;
    grid-template-columns:140px 1fr;
    gap:8px;
}
.validation-message{
    grid-column:2;
    margin-top:-4px;
}

    .field-row label {
      font-size: 0.9rem;
      color: var(--text-mid);
      white-space: nowrap;
    }

    /* ── Profile photo card ──────────────────── */
    .photo-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 18px;
    }

    .photo-card-heading {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .photo-card-heading .cam-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--green-main);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-card-heading h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .photo-preview {
      width: 100%;
      aspect-ratio: 4/3;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      background: repeating-conic-gradient(#e5e7eb 0% 25%, #f9fafb 0% 50%) 0 0 / 20px 20px;
    }

    .btn-upload {
      width: 100%;
      justify-content: center;
      background: var(--green-dark);
      color: var(--white);
      border: none;
      padding: 13px;
      font-size: 0.95rem;
      border-radius: var(--radius-md);
    }

    /* ── Action buttons ──────────────────────── */
    .action-row {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 20px 28px 36px;
    }

    .btn-clear {
      background: var(--white);
      color: var(--text-mid);
      border: 1.5px solid var(--border);
      padding: 12px 40px;
      font-size: 1rem;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .btn-save {
      background: var(--green-dark);
      color: var(--white);
      border: none;
      padding: 12px 44px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    /* ── Toast notification ──────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 0.93rem;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,0.13);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.35s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .toast.success {
      background: #edfaf3;
      border: 1.5px solid #34a853;
      color: #1a6b3c;
    }

    .toast.error {
      background: #fef2f2;
      border: 1.5px solid #fca5a5;
      color: #dc2626;
    }

    .btn-save:disabled, .btn-save.loading {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* Photo preview with image */
    .photo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: var(--radius-md);
    }
  
/* VALIDATION STYLES */

.form-control.error {
  border: 2px solid #dc2626 !important;
  background: #fef2f2;
}

.form-control.success {
  border: 2px solid #16a34a !important;
}

.validation-message {
  grid-column: 2;
  font-size: 0.8rem;
  color: #dc2626;
  margin-top: -4px;
  padding-left: 2px;
  display: none;
}

.validation-message.show {
  display: block;
}
/* ================= NAVBAR BASE ================= */

.navbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: white;
  z-index: 1000;
}

.navbar-nav {
  display: flex;
  gap: 20px;
  list-style: none;
}

.navbar-actions-wrapper {
  display: flex;
  align-items: center;
  gap: 18px;
}

.navbar-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* hide toggle on desktop */
.menu-toggle {
  display: none;
  font-size: 24px;
  background: none;
  border: none;
  cursor: pointer;
}



/* TABLETS */
@media (max-width: 1024px) {

  .main-grid {
    grid-template-columns: 1fr;
    margin-top: 90px;
  }

  .photo-card {
    max-width: 450px;
    margin: 0 auto;
    width: 100%;
  }

  .section-card .form-grid-2 {
    grid-template-columns: 1fr;
  }

  
}


/*  MOBILE */
@media (max-width: 768px) {

    padding: 0 15px;

    margin-top: 90px;
  }

    height: 70px;
    display: flex;
    align-items: center;

    padding: 0 15px;
  }

  /* BRAND stays left */
  .navbar-brand {
    position: absolute;
    left: 15px;
  }

  /* CENTER admin email + logout */
  .navbar-actions-wrapper {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);

    align-items: center;
    gap: 10px;
  }
  #logout-btn{

    display: flex;

    gap: 10px;
  }

  #admin-label {
    font-size: 0.8rem;
    color: #444;
    white-space: nowrap;
  }

  /* HAMBURGER RIGHT */
  .menu-toggle {
    display: block;
    position: fixed;
    left: 300px;
    top: 5px;
    font-size: 24px;
  }

  

  /* DROPDOWN MENU */
  .navbar-nav {
    display: none;
    position: absolute;
    top: 70px;
    right:10px ;
    width: 100%;
    background: #fff;
    flex-direction: column;
    text-align: center;
    padding: 10px 0;
    border-radius: 20px;
    background: #cef1db;
    /*border-top: 1px solid #ddd;*/
    z-index: 999;
    transition: all .7s ease;
  }

  .navbar-nav.show {
    display: flex;
    width: 70%;
    height: 200px;
    font-size: 18px;
    font-weight: bold;
    gap: 12px;
    transition: all .7s ease;
  }             
  
}
@media (max-width: 700px) {

@media (max-width: 550px) {

    font-size: 0.95rem;
  }

    left: 15px;
    right: 15px;
    width: auto;
    bottom: 15px;
  }
  .menu-toggle {
    top: 5px;
    font-size: 24px;

  }

}
@media (max-width: 350px){

    top: 5px;

  <script src="js/api.js"></script>
  <script>
    // ── Auth guard ────────────────────────────────────────────────
    requireAuth();

    // ── Show admin email in navbar ────────────────────────────────
    const adminEmail = getAdminEmail();
    if (adminEmail) {
      document.getElementById('admin-label').textContent = adminEmail;
      document.getElementById('logout-btn').style.display = 'inline-flex';
    }

    // Logout
    document.getElementById('logout-btn').addEventListener('click', function (e) {
      e.preventDefault();
      clearToken();
      window.location.href = 'login.html';
    });

    // ── Photo preview ─────────────────────────────────────────────
    document.getElementById('photo-input').addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const preview = document.getElementById('photo-preview');
        preview.innerHTML = `<img src="${e.target.result}" alt="Preview" />`;
      };
      reader.readAsDataURL(file);
    });

// VALIDATION SYSTEM


function showError(inputId, message) {
  const input = document.getElementById(inputId);
  const error = document.getElementById(inputId + '-error');

  input.classList.remove('success');
  input.classList.add('error');

  error.textContent = message;
  error.classList.add('show');

  return false;
}

function showSuccess(inputId) {
  const input = document.getElementById(inputId);
  const error = document.getElementById(inputId + '-error');

  input.classList.remove('error');
  input.classList.add('success');

  error.textContent = '';
  error.classList.remove('show');

  return true;
}
function validateFirstName() {
  const value = document.getElementById('first-name').value.trim();

  if (value.length < 2) {
    return showError(
      'first-name',
      'First name must be at least 2 characters'
    );
  }

  return showSuccess('first-name');
}

function validateLastName() {
  const value = document.getElementById('last-name').value.trim();

  if (value.length < 2) {
    return showError(
      'last-name',
      'Last name must be at least 2 characters'
    );
  }

  return showSuccess('last-name');
}

function validateEmail() {
  const value = document.getElementById('email').value.trim();

  const emailRegex =
    /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!emailRegex.test(value)) {
    return showError(
      'email',
      'Enter a valid email address'
    );
  }

  return showSuccess('email');
}

function validateMobile() {
  const value =
    document.getElementById('mobile').value.trim();

  if (!/^0\d{10}$/.test(value)) {
    return showError(
      'mobile',
      'Phone number must be 11 digits'
    );
  }

  return showSuccess('mobile');
}

function validateNationalId() {
  const value =
    document.getElementById('national-id').value.trim();

  if (value.length < 8) {
    return showError(
      'national-id',
      'National ID is too short'
    );
  }

  return showSuccess('national-id');
}

function validateAge() {
  const age =
    parseInt(document.getElementById('age').value);

  if (isNaN(age) || age < 1 || age > 120) {
    return showError(
      'age',
      'Age must be between 1 and 120'
    );
  }

  return showSuccess('age');
}

function validateDepartment() {
  const value =
    document.getElementById('department').value.trim();

  if (value.length < 2) {
    return showError(
      'department',
      'Department is required'
    );
  }

  return showSuccess('department');
}

function validateDOB() {
  const value =
    document.getElementById('dob').value.trim();

  if (!value) {
    return showError(
      'dob',
      'Date of birth is required'
    );
  }

  return showSuccess('dob');
}
// real time validation error
function validateStreet() {
  const value =
    document.getElementById('street').value.trim();

  if (value.length < 5) {
    return showError(
      'street',
      'Street address is too short'
    );
  }

  return showSuccess('street');
}

function validateZip() {
  const value =
    document.getElementById('zip').value.trim();

  if (!/^\d{5,10}$/.test(value)) {
    return showError(
      'zip',
      'Invalid zip code'
    );
  }

  return showSuccess('zip');
}
// validation while typing
document.getElementById('first-name')
  .addEventListener('input', validateFirstName);

document.getElementById('last-name')
  .addEventListener('input', validateLastName);

document.getElementById('email')

document.getElementById('mobile')

document.getElementById('national-id')

document.getElementById('age')
  .addEventListener('input', validateAge);

document.getElementById('department')
  .addEventListener('input', validateDepartment);

document.getElementById('dob')
  .addEventListener('input', validateDOB);

document.getElementById('street')

document.getElementById('zip')

    // ── Save patient ──────────────────────────────────────────────
    async function savePatient() {
      const valid =
      validateFirstName() &&
      validateLastName() &&
      validateEmail() &&
      validateMobile() &&
      validateNationalId() &&
      validateAge() &&
      validateDepartment() &&
      validateDOB() &&
      validateStreet() &&
      validateZip();

    if (!valid) {
      showToast(
        'Please correct the highlighted fields.',
        'error'
      );
      return;
    }
      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.innerHTML = `
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
        Saving...`;

      // Parse date (dd-Mon-yyyy or yyyy-MM-dd)
      let dobRaw = document.getElementById('dob').value.trim();
      let dateOfBirth = null;
      if (dobRaw) {
        const parsed = new Date(dobRaw);
        if (!isNaN(parsed)) {
          dateOfBirth = parsed.toISOString();
        }
      }

      // Map gender safely
      const genderVal = document.getElementById('gender').value.toUpperCase();

      // Map bloodType safely
      let bloodTypeVal = document.getElementById('blood-type').value;
      bloodTypeVal = bloodTypeVal.replace(/[^A-Za-z]/g, '').toUpperCase();
      if (!['O', 'A', 'B', 'AB'].includes(bloodTypeVal)) {
        bloodTypeVal = 'O';
      }

      // Map genotype safely
      let genotypeVal = document.getElementById('genotype').value.toUpperCase();
      if (!['AA', 'AS', 'SS'].includes(genotypeVal)) {
        genotypeVal = 'AA';
      }

      // Map marital status to boolean
      const isMarriedVal = document.getElementById('marital').value.toLowerCase() === 'married';

      const payload = {
        email: document.getElementById('email').value.trim(),
        fullName: document.getElementById('first-name').value.trim() + ' ' + document.getElementById('last-name').value.trim(),
        nationalID: document.getElementById('national-id').value.trim(),
        gender: genderVal,
        phoneNumber: document.getElementById('mobile').value.trim(),
        dob: dateOfBirth,
        bloodType: bloodTypeVal,
        genotype: genotypeVal,
        isMarried: isMarriedVal,
        address: {
          country: document.getElementById('country').value,
          city: document.getElementById('city').value,
          state: document.getElementById('state').value,
          streetAddress: document.getElementById('street').value.trim(),
          zipCode: document.getElementById('zip').value.trim()
        }
      };

      try {
        const res = await apiFetch('/patients/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res) return; // apiFetch redirected to login

        let data = {};
        try {
          data = await res.json();
        } catch (e) {
          // Fallback if response is not JSON
        }

        if (res.ok) {
          showToast(`Patient ${data.fullName || 'Record'} saved successfully!`, 'success');
          clearForm();
        } else if (res.status === 409) {
          console.error('savePatient conflict registration error (409):', data);
          showToast(data.error || 'A patient with this email or national ID already exists.', 'error');
        } else {
          console.error('savePatient error response status:', res.status, data);
          showToast(data.error || `Failed to save patient (Status: ${res.status}). Please check all required fields.`, 'error');
        }
      } catch (err) {
        console.error('savePatient exception:', err);
        showToast('Could not reach the server. Is the backend running?', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Save`;
      }
    }
