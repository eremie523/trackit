<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trackit – Admin Login</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { overflow: hidden; }

    .navbar{
      width: 100%;
      height: 55px;
    }

    .wave-light {
      position: fixed;
      right: 0;
      top: 60px;
      width: 50%;
      z-index: 0;
      pointer-events: none;
    }

    .wave-dark {
      position: fixed;
      right: 0;
      bottom: 0;
      width: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .login-wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 70px);
      padding: 15px 10px;
    
    }

    .login-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 20px 48px 30px;
      width: 100%;
      max-width: 520px;
      margin-top: 50px;
      box-shadow: var(--shadow);
    }

    .login-avatar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .login-avatar .avatar-circle {
      width: 50px;
      height: 50px;
      background: var(--green-main);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-avatar svg {
      width: 40px;
      height: 40px;
      fill: var(--white);
    }

    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #edfaf3;
      border: 1.5px solid var(--green-main);
      color: var(--green-main);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
    }

    .login-title {
      text-align: center;
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 4px;
    }

    .login-subtitle {
      text-align: center;
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-bottom: 0;
    }

    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1.5px solid #fca5a5;
      color: #dc2626;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.88rem;
      margin-bottom: 16px;
      align-items: center;
      gap: 8px;
    }

    .error-msg.show {
      display: flex;
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .login-field {
      margin-bottom: 20px;
    }

    .login-field label {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 8px;
    }

    .input-with-icon {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-with-icon .icon-left {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      display: flex;
    }

    .input-with-icon .icon-right {
      position: absolute;
      right: 14px;
      color: var(--text-muted);
      display: flex;
      cursor: pointer;
    }

    .input-with-icon .form-control {
      padding-left: 44px;
      padding-right: 44px;
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .remember-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      accent-color: var(--green-main);
    }

    .remember-row label {
      font-size: 0.93rem;
      color: var(--text-mid);
    }

    .btn-login {
      width: 100%;
      justify-content: center;
      padding: 14px;
      font-size: 1rem;
      border-radius: var(--radius-md);
      background: var(--green-main);
      color: var(--white);
      border: none;
      margin-bottom: 18px;
    }

    .forgot-link {
      display: block;
      text-align: center;
      color: var(--green-main);
      font-size: 0.93rem;
      text-decoration: none;
      border-bottom: 1.5px solid var(--green-main);
      padding-bottom: 2px;
      width: fit-content;
      margin: 0 auto;
    }
    /*TABLET (768px and below)*/
@media screen and (max-width: 768px) {

  body{
    overflow-y: auto;
    overflow-x: hidden; 
    
  }

  .navbar{
    padding: 10px 15px;
    height: 70px;
    position: fixed;
  }

  .navbar-nav{
    display: none; /* Hide menu links on small screens */
  }

  .login-wrapper{
    min-height: calc(100vh - 50px);
    padding: 20px;
    
  }

  .login-card{
    max-width: 400px;
    padding: 20px;
    margin-top: 80px ;
  }

  .wave-light{
    width: 70%;
  }

  .login-title{
    font-size: 1.2rem;
  }

  .login-subtitle{
    font-size: 0.85rem;
  }
}


/* MOBILE (600px and below)*/
@media screen and (max-width: 600px) {

  *{
    padding: 0;
    margin: 0;
  }
  .login-wrapper{
    padding: 15px;
    align-items: flex-start;
    padding-top: 30px;
  }

  .login-card{
    width:95%;
    max-width: 100%;
    padding: 18px;
    border-radius: 16px;
  }

  .login-avatar{
    gap: 10px;
    margin-bottom: 20px;
  }

  .login-avatar .avatar-circle{
    width: 45px;
    height: 45px;
  }

  .login-avatar svg{
    width: 30px;
    height: 30px;
  }

  .login-title{
    font-size: 1.1rem;
  }

  .login-subtitle{
    font-size: 0.8rem;
  }

  .login-field{
    margin-bottom: 16px;
  }

  .login-field label{
    font-size: 0.9rem;
  }

  .form-control{
    height: 45px;
    font-size: 0.9rem;
  }

  .btn-login{
    padding: 12px;
    font-size: 0.95rem;
  }

  .remember-row{
    margin-bottom: 18px;
  }

  .forgot-link{
    font-size: 0.85rem;
  }

  .wave-light{
    width: 85%;
    top: 80px;
  }

  .wave-dark{
    opacity: 0.7;
  }
}


/* SMALL PHONES (400px and below)*/
@media screen and (max-width: 400px) {

  .login-card{
    padding: 15px;
  }

  .admin-badge{
    font-size: 0.7rem;
    padding: 4px 10px;
  }

  .login-title{
    font-size: 1rem;
  }

  .login-subtitle{
    font-size: 0.75rem;
  }

  .input-with-icon .form-control{
    padding-left: 40px;
    padding-right: 40px;
  }

  .icon-left{
    left: 12px;
  }

  .icon-right{
    right: 12px;
  }

  .btn-login{
    font-size: 0.9rem;
  }
}
  </style>
</head>
<body>

  <!-- Light wave -->
  <svg class="wave-light" viewBox="0 0 660 520" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M660 0 C560 70, 420 30, 320 120 C220 210, 120 170, 0 250 L0 520 L660 520 Z"
          fill="#d6f0e0" opacity="0.7"/>
  </svg>

  <!-- Dark wave -->
  <svg class="wave-dark" viewBox="0 0 1280 380" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 240 C90 195, 210 285, 370 240 C510 198, 590 270, 740 215
             C880 162, 980 258, 1130 198 C1220 165, 1260 185, 1280 175
             L1280 380 L0 380 Z"
          fill="url(#wgLogin)"/>
    <defs>
      <linearGradient id="wgLogin" x1="0" y1="0" x2="1280" y2="0">
        <stop offset="0%" stop-color="#3cb871" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#1a6b3c"/>
      </linearGradient>
    </defs>
  </svg>

  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <svg class="logo-icon" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="21" cy="21" r="21" fill="#f1f5f9"/>
        <rect x="18" y="8"  width="6" height="26" rx="2" fill="#34a853"/>
        <rect x="8"  y="18" width="26" height="6"  rx="2" fill="#ea4335"/>
        <rect x="8"  y="18" width="13" height="6"  rx="2" fill="#4285f4"/>
        <rect x="18" y="8"  width="6"  height="13" rx="2" fill="#fbbc05"/>
      </svg>
      <span class="brand-name">trackit</span>
    </a>
    <ul class="navbar-nav">
      <li><a href="index.html">Home</a></li>
      <li><a href="patient-portal.html">Patient Portal</a></li>
    </ul>
    <div class="navbar-actions">
      <a href="login.html" class="btn btn-primary">Doctor Login</a>
    </div>
  </nav>

  <!-- Login form -->
  <div class="login-wrapper">
    <div class="login-card">

      <div class="login-avatar">
        <div class="avatar-circle">
          <!-- Shield / admin icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm0 13c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08A7.24 7.24 0 0 1 12 18z"/>
          </svg>
        </div>
        <span class="admin-badge">
          <svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
          </svg>
          Admin Portal
        </span>
        <p class="login-title">Welcome back</p>
        <p class="login-subtitle">Sign in to your admin account</p>
      </div>

      <!-- Error message -->
      <div class="error-msg" id="login-error">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="login-error-text">Invalid credentials. Please try again.</span>
      </div>

      <div class="login-field">
        <label for="email">Email Address</label>
        <div class="input-with-icon">
          <span class="icon-left">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </span>
          <input type="email" id="email" class="form-control" placeholder="admin@ecg.com" autocomplete="email" />
        </div>
      </div>

      <div class="login-field">
        <label for="password">Password</label>
        <div class="input-with-icon">
          <span class="icon-left">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" />
          <span class="icon-right" id="toggle-password" title="Show/hide password">
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </span>
        </div>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="remember" />
        <label for="remember">Remember me</label>
      </div>

      <button class="btn btn-login" id="login-btn" onclick="handleLogin()">Sign In</button>
      <a href="#" class="forgot-link">Forgot Password</a>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirect to dashboard if already logged in
    if (getToken()) {
      window.location.href = 'new-patient.html';
    }

    // Toggle password visibility
    document.getElementById('toggle-password').addEventListener('click', function () {
      const pwdInput = document.getElementById('password');
      const isText = pwdInput.type === 'text';
      pwdInput.type = isText ? 'password' : 'text';
    });

    // Allow Enter key to submit
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');
      const errBox   = document.getElementById('login-error');
      const errText  = document.getElementById('login-error-text');

      // Basic client-side validation
      if (!email || !password) {
        errText.textContent = 'Please enter your email and password.';
        errBox.classList.add('show');
        return;
      }

      // Loading state
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errBox.classList.remove('show');

      try {
        const res = await fetch(`${BASE_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (res.ok) {
          setToken(data.accessToken);
          setAdminEmail(data.email);
          // Redirect to main dashboard
          window.location.href = 'new-patient.html';
        } else {
          console.error('handleLogin failed, status:', res.status, data);
          errText.textContent = data.error || 'Invalid credentials. Please try again.';
          errBox.classList.add('show');
        }
      } catch (err) {
        console.error('handleLogin exception:', err);
        errText.textContent = 'Could not reach the server. Is the backend running?';
        errBox.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>

</body>
</html>
